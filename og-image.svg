<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#7B2FBE" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="350" r="250" fill="#22C55E" opacity="0.06" filter="url(#blur1)"/>
  <!-- Grid lines -->
  <g stroke="#7B2FBE" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- Profit chart area fill -->
  <path d="M 100,460 L 250,440 L 400,420 L 500,390 L 600,350 L 700,310 L 800,260 L 900,230 L 1000,200 L 1100,180 L 1100,460 Z" fill="url(#glow)"/>
  <!-- Profit chart line -->
  <path d="M 100,460 L 250,440 L 400,420 L 500,390 L 600,350 L 700,310 L 800,260 L 900,230 L 1000,200 L 1100,180" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#blur2)"/>
  <path d="M 100,460 L 250,440 L 400,420 L 500,390 L 600,350 L 700,310 L 800,260 L 900,230 L 1000,200 L 1100,180" fill="none" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chart dots -->
  <circle cx="1100" cy="180" r="5" fill="#22C55E"/>
  <circle cx="1100" cy="180" r="10" fill="#22C55E" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">MotoArb</text>
  <!-- Subtitle -->
  <text x="600" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#A0A0B8">Automated Arbitrage Trading on Bitcoin L1</text>
  <!-- Stats row -->
  <text x="280" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#22C55E">+$717</text>
  <text x="280" y="570" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6B6B80">PROFIT</text>
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#A855F7">100%</text>
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6B6B80">WIN RATE</text>
  <text x="920" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#A855F7">OPNet</text>
  <text x="920" y="570" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6B6B80">MOTOSWAP DEX</text>
  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#7B2FBE" stroke-opacity="0.15" stroke-width="2"/>
</svg>
