/* ========== CSS Custom Properties ========== */
:root {

  --font: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;

/* ========== Reset & Base ========== */

html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {

}

}

  padding: 24px; backdrop-filter: var(--glass-blur) var(--glass-saturate);
  transition: all var(--transition-base); position: relative; overflow: hidden;
}

.card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
.card-clickable { cursor: pointer; }
.card-clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

}

/* ========== TVL Hero ========== */
.tvl-hero { text-align: center; padding: 40px 0 32px; }

.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

.section { margin-bottom: 24px; }

.token-card .token-symbol { font-size: 0.8rem; color: var(--text-secondary); }

.staking-hero { text-align: center; padding: 20px 0; }

/* ========== Detail View ========== */
.detail-header { margin-bottom: 24px; }

/* ========== Reserves Visualization ========== */
.reserves-viz { display: flex; height: 40px; border-radius: var(--radius-sm); overflow: hidden; margin: 16px 0; }
.reserves-viz-bar { display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; color: white; transition: width 0.6s ease; }

/* ========== Chart Container ========== */
.chart-container { position: relative; width: 100%; height: 300px; }
.chart-container canvas { width: 100% !important; height: 100% !important; }

/* ========== Distribution Ring ========== */
.dist-ring-container { display: flex; align-items: center; gap: 24px; }
.dist-ring-wrap { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
.dist-ring-wrap canvas { width: 100% !important; height: 100% !important; }
.dist-legend { flex: 1; }
.dist-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.dist-legend-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* ========== Table ========== */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {

.data-table td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid rgba(123,47,190,0.06); }
.data-table tr:hover td { background: rgba(123,47,190,0.04); }
.data-table .text-right { text-align: right; }
.data-table .text-green { color: var(--green); }
.data-table .text-yellow { color: var(--yellow); }
.data-table .text-muted { color: var(--text-muted); }

.info-tip { position: relative; display: inline-flex; cursor: help; margin-left: 4px; }

.info-tip:hover::after { opacity: 1; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.stagger-3 { animation-delay: 0.15s; opacity: 0; }
.stagger-4 { animation-delay: 0.2s; opacity: 0; }
.stagger-5 { animation-delay: 0.25s; opacity: 0; }
.stagger-6 { animation-delay: 0.3s; opacity: 0; }

.text-green { color: var(--green); }

  display: flex; align-items: center; justify-content: center;

  animation: progressShimmer 1.5s linear infinite;
  transition: width 0.4s ease;
}
@keyframes progressShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.loading-status { font-size: 0.75rem; color: var(--text-secondary); }

/* ========== Arbitrage ========== */
.arb-viable { border-color: var(--green) !important; }
.arb-viable::before { background: linear-gradient(90deg, transparent, var(--green), transparent) !important; }
.arb-not-viable { opacity: 0.65; }
.arb-direction-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; white-space: nowrap;
}
.arb-direction-badge.sell { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.arb-direction-badge.buy { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

.arb-arrow { color: var(--primary-light); font-weight: 700; margin: 0 4px; }
.deviation-bar { height: 6px; border-radius: 3px; background: rgba(123,47,190,0.1); overflow: hidden; margin-top: 6px; }
.deviation-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.deviation-fill.low { background: var(--green); }
.deviation-fill.med { background: var(--yellow); }
.deviation-fill.high { background: var(--orange); }
.deviation-fill.extreme { background: var(--red); }
.impact-low { color: var(--green); }
.impact-med { color: var(--yellow); }
.impact-high { color: var(--orange); }
.impact-extreme { color: var(--red); }
.tri-arb-step {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid rgba(123,47,190,0.06); font-size: 0.82rem;
}
.tri-arb-step:last-child { border-bottom: none; }
.tri-arb-step .step-num {
  width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; background: rgba(123,47,190,0.15); color: var(--primary-light); flex-shrink: 0;
}
.tri-arb-cycle {
  display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600;
  padding: 10px 0; margin-bottom: 8px;
}
.tri-arb-cycle .cycle-token { color: var(--text-primary); }
.tri-arb-cycle .cycle-arrow { color: var(--primary-light); font-size: 0.9rem; }

.footer {
  text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.78rem;
  border-top: 1px solid var(--border-color); margin-top: 40px;
}
</style>
</head>
<body>
<noscript><div style="background:#0A0A0F;color:#A0A0B8;padding:40px;text-align:center;font-family:system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center;"><div><h1 style="color:white;font-size:2rem;">MotoScope</h1><p>Real-time TVL analytics for MotoSwap DEX on Bitcoin L1.</p><p style="color:#6B6B80;margin-top:20px;">This application requires JavaScript to run.</p></div></div></noscript>

<div class="bg-effects">
  <div class="glow-orb glow-orb--1"></div>
  <div class="glow-orb glow-orb--2"></div>
  <div class="glow-orb glow-orb--3"></div>
</div>
<div class="grid-overlay"></div>

<!-- Price Ticker -->
<div class="price-ticker">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<!-- Status Banner -->
<div class="status-banner status-banner--loading" id="status-banner">
  <span class="pulse-dot"></span> Connecting to OPNet Regtest...
</div>

<!-- Loading Progress Bar -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-card">
    <div class="loading-brand">MS</div>
    <div class="loading-title">MotoScope</div>
    <div class="loading-sub">Fetching on-chain data from OPNet Regtest...</div>
    <div class="loading-progress-track">
      <div class="loading-progress-fill" id="loading-fill"></div>
    </div>
    <div class="loading-status" id="loading-status">Connecting to RPC...</div>
  </div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="brand">
          <div class="brand-icon">MS</div>
          <div class="brand-name">MotoScope</div>
        </div>
        <div class="header-subtitle">DeFi Intelligence for MotoSwap &middot; OPNet Regtest</div>
      </div>
      <div class="header-right" id="nav-buttons">
        <button class="nav-btn active" onclick="navigate('#/')">Overview</button>
        <button class="nav-btn" onclick="navigate('#/pools')">Pools</button>
        <button class="nav-btn" onclick="navigate('#/tokens')">Tokens</button>
        <button class="nav-btn" onclick="navigate('#/staking')">Staking</button>
        <button class="nav-btn" onclick="navigate('#/farming')">Farming</button>
        <button class="nav-btn" onclick="navigate('#/arbitrage')">Arbitrage</button>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div id="app"></div>

  <div class="footer">
    MotoScope &middot; DeFi Intelligence for MotoSwap on OPNet &middot; Data refreshes every 60s<br>
    <span class="text-muted" id="footer-update"></span>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let DATA = null;
let HISTORY = [];
let chartInstances = {};

// ── Formatting ──────────────────────────────────────────────────────────────
function fmtUsd(n) {
  if (n == null || isNaN(n)) return '$0.00';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(2) + 'K';
  if (n >= 1) return '$' + n.toFixed(2);
  if (n >= 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(6);
}

function fmtBtc(n) {
  if (n == null || isNaN(n)) return '0 BTC';
  if (n >= 1000) return n.toFixed(2) + ' BTC';
  if (n >= 1) return n.toFixed(4) + ' BTC';
  if (n >= 0.001) return n.toFixed(6) + ' BTC';
  return n.toFixed(8) + ' BTC';
}

function fmtNum(n, dec = 2) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n / 1e9).toFixed(dec) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(dec) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(dec) + 'K';
  return n.toFixed(dec);
}

function fmtFull(n) {
  if (n == null) return '0';
  return Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return '0%';
  return n.toFixed(2) + '%';
}

function fmtAddr(a) {
  if (!a) return '';
  if (a.length > 16) return a.slice(0, 10) + '...' + a.slice(-8);
  return a;
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// ── Navigation ──────────────────────────────────────────────────────────────
function navigate(hash) {
  window.location.hash = hash;
}

function getRoute() {
  const hash = window.location.hash || '#/';
  return hash;
}

function updateNav() {
  const route = getRoute();
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const target = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '';
    btn.classList.toggle('active', route === target || (route.startsWith(target) && target !== '#/') || (target === '#/' && route === '#/'));
  });
}

// ── Render Router ───────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;
  const route = getRoute();
  const app = document.getElementById('app');

  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  if (route === '#/' || route === '' || route === '#') {
    app.innerHTML = renderOverview();
  } else if (route === '#/pools') {
    app.innerHTML = renderPoolsList();
  } else if (route.startsWith('#/pool/')) {
    const addr = route.replace('#/pool/', '');
    app.innerHTML = renderPoolDetail(addr);
  } else if (route === '#/tokens') {
    app.innerHTML = renderTokensList();
  } else if (route.startsWith('#/token/')) {
    const sym = route.replace('#/token/', '');
    app.innerHTML = renderTokenDetail(sym);
  } else if (route === '#/staking') {
    app.innerHTML = renderStakingDetail();
  } else if (route === '#/farming') {
    app.innerHTML = renderFarmingDetail();
  } else if (route === '#/arbitrage') {
    app.innerHTML = renderArbitrage();
  } else {
    app.innerHTML = renderOverview();
  }

  updateNav();

  // Initialize charts after DOM is ready
  requestAnimationFrame(() => initCharts(route));
}

// ── Overview Page ───────────────────────────────────────────────────────────
function renderOverview() {
  const tvl = DATA.tvl?.total || {};
  const poolsTvl = DATA.tvl?.pools || {};
  const stakingTvl = DATA.tvl?.staking || {};
  const farmingTvl = DATA.tvl?.farming || {};
  const poolsShare = tvl.usd > 0 ? (poolsTvl.usd / tvl.usd) * 100 : 0;
  const stakingShare = tvl.usd > 0 ? (stakingTvl.usd / tvl.usd) * 100 : 0;
  const farmingShare = tvl.usd > 0 ? (farmingTvl.usd / tvl.usd) * 100 : 0;

  let html = '';

  // TVL Hero
  const farmCount = DATA.farming?.motoChefs?.length || 0;
  html += `
  <div class="tvl-hero slide-up">
    <div class="tvl-hero-label">Total Value Locked</div>
    <div class="tvl-hero-value">${fmtUsd(tvl.usd)}</div>
    <div class="tvl-hero-btc">${fmtBtc(tvl.btc)}</div>
    <div class="tvl-hero-sub">Across ${DATA.pools?.filter(p => !p.error).length || 0} pools + staking${farmCount > 0 ? ' + ' + farmCount + ' farm' + (farmCount > 1 ? 's' : '') : ''} &middot; Block #${fmtNum(DATA.chain?.blockNumber, 0)}</div>
  </div>`;

  // TVL Breakdown Cards
  html += `
  <div class="grid-4 section slide-up stagger-1">
    <div class="card card-clickable" onclick="navigate('#/pools')">
      <div class="card-header">
        <span class="card-title">Liquidity Pools</span>
        <span class="card-badge">${fmtPct(poolsShare)}</span>
      </div>
      <div class="metric">
        <div class="metric-value text-green">${fmtUsd(poolsTvl.usd)}</div>
        <div class="metric-sub text-yellow">${fmtBtc(poolsTvl.btc)}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill green" style="width:${poolsShare}%"></div></div>
    </div>
    <div class="card card-clickable" onclick="navigate('#/staking')">
      <div class="card-header">
        <span class="card-title">Staking</span>
        <span class="card-badge">${fmtPct(stakingShare)}</span>
      </div>
      <div class="metric">
        <div class="metric-value text-purple">${fmtUsd(stakingTvl.usd)}</div>
        <div class="metric-sub text-yellow">${fmtBtc(stakingTvl.btc)}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill purple" style="width:${stakingShare}%"></div></div>
    </div>
    <div class="card card-clickable" onclick="navigate('#/farming')">
      <div class="card-header">
        <span class="card-title">Yield Farming</span>
        <span class="card-badge">${fmtPct(farmingShare)}</span>
      </div>
      <div class="metric">
        <div class="metric-value text-orange">${fmtUsd(farmingTvl.usd)}</div>
        <div class="metric-sub text-yellow">${fmtBtc(farmingTvl.btc)}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill orange" style="width:${farmingShare}%"></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Bitcoin Price</span>
        <span class="card-badge">${DATA.btcPrice?.source || 'N/A'}</span>
      </div>
      <div class="metric">
        <div class="metric-value">${fmtUsd(DATA.btcPrice?.usd)}</div>
        <div class="metric-sub">1 BTC</div>
      </div>
    </div>
  </div>`;

  // TVL Chart + Protocol Breakdown
  html += `
  <div class="grid-2-1 section slide-up stagger-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">TVL Over Time</span>
        <span class="card-badge">Live</span>
      </div>
      <div class="chart-container">
        <canvas id="tvl-chart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">TVL Composition</span>
      </div>
      <div class="dist-ring-container">
        <div class="dist-ring-wrap"><canvas id="tvl-pie"></canvas></div>
        <div class="dist-legend" id="tvl-pie-legend"></div>
      </div>
    </div>
  </div>`;

  // Pool Cards
  html += `<div class="section-title slide-up stagger-3"><span class="icon">&#x1f4ca;</span> Liquidity Pools</div>`;
  html += `<div class="grid-3 section slide-up stagger-3">`;
  for (const pool of (DATA.pools || [])) {
    if (pool.error) continue;
    html += renderPoolCard(pool);
  }
  html += `</div>`;

  // Token Cards
  html += `<div class="section-title slide-up stagger-4"><span class="icon">&#x1fa99;</span> Token Prices</div>`;
  html += `<div class="grid-3 section slide-up stagger-4">`;
  for (const [sym, token] of Object.entries(DATA.tokens || {})) {
    if (token.error) continue;
    html += renderTokenCard(sym, token);
  }
  html += `</div>`;

  // NativeSwap Reserves
  if (DATA.nativeSwap && Object.keys(DATA.nativeSwap).length > 0) {
    html += `<div class="section-title slide-up stagger-5"><span class="icon">&#x26a1;</span> NativeSwap Reserves (BTC Pricing Source)</div>`;
    html += `<div class="card section slide-up stagger-5">
      <table class="data-table">
        <thead><tr><th>Token</th><th class="text-right">Virtual BTC Reserve</th><th class="text-right">Virtual Token Reserve</th><th class="text-right">Token Liquidity</th><th class="text-right">Price (BTC)</th><th class="text-right">Price (USD)</th></tr></thead>
        <tbody>`;
    for (const [sym, ns] of Object.entries(DATA.nativeSwap)) {
      html += `
        <tr>
          <td><strong>${sym}</strong></td>
          <td class="text-right text-yellow fw-600">${ns.virtualBTCReserve?.toFixed(4)} BTC</td>
          <td class="text-right">${fmtNum(ns.virtualTokenReserve)} ${sym}</td>
          <td class="text-right">${fmtNum(ns.liquidity)} ${sym}</td>
          <td class="text-right text-yellow">${ns.priceBtc?.toFixed(10)} BTC</td>
          <td class="text-right text-green">${fmtUsd(ns.priceUsd)}</td>
        </tr>`;
    }
    html += `</tbody></table>
      <div class="mt-8 text-sm text-muted">Prices derived from NativeSwap virtual reserves (virtualBTCReserve / virtualTokenReserve). Qualified tokens: ${DATA.qualifiedTokens?.join(', ') || 'N/A'}${DATA.excludedTokens?.length > 0 ? ' &middot; Excluded: ' + DATA.excludedTokens.join(', ') : ''}</div>
    </div>`;
  }

  // Protocol Info
  html += `
  <div class="section slide-up stagger-6">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Protocol Details</span>
        <span class="card-badge">OPNet Regtest</span>
      </div>
      <div class="grid-2">
        <div>
          <div class="metric-row"><span class="text-muted text-sm">Block Height</span><span class="fw-600">#${fmtFull(DATA.chain?.blockNumber)}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Factory</span><span class="mono text-sm">${fmtAddr(DATA.protocol?.factoryAddress)}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Router</span><span class="mono text-sm">${fmtAddr(DATA.protocol?.routerAddress)}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">NativeSwap</span><span class="mono text-sm">${fmtAddr(DATA.protocol?.nativeSwapAddress)}</span></div>
        </div>
        <div>
          <div class="metric-row"><span class="text-muted text-sm">Base Gas</span><span class="fw-600">${DATA.chain?.gas?.baseGas || 'N/A'}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Staking Contract</span><span class="mono text-sm">${fmtAddr(DATA.protocol?.stakingAddress)}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Price Source</span><span class="fw-600">NativeSwap + ${DATA.btcPrice?.source || 'N/A'}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Last Updated</span><span class="fw-600">${fmtTime(DATA.lastUpdated)}</span></div>
        </div>
      </div>
    </div>
  </div>`;

  return html;
}

// ── Pool Card (for overview) ────────────────────────────────────────────────
function renderPoolCard(pool) {
  const tvlUsd = pool.tvlUsd || 0;
  const tvlBtc = pool.tvlBtc || 0;
  const dom = pool.dominancePct || 0;
  const t0val = pool.token0ValueUsd || 0;
  const t1val = pool.token1ValueUsd || 0;
  const valTotal = t0val + t1val;
  const t0pct = valTotal > 0 ? (t0val / valTotal) * 100 : 50;

  return `
  <div class="card card-clickable pool-card" onclick="navigate('#/pool/${pool.poolAddress}')">
    <div class="card-header">
      <span class="pool-pair">${pool.pairLabel}</span>
      <span class="card-badge">${fmtPct(dom)} TVL</span>
    </div>
    <div class="pool-tvl">${fmtUsd(tvlUsd)}</div>
    <div class="pool-tvl-btc">${fmtBtc(tvlBtc)}</div>
    <div class="reserves-viz">
      <div class="reserves-viz-bar token0" style="width:${t0pct}%">${pool.token0Symbol}</div>
      <div class="reserves-viz-bar token1" style="width:${100 - t0pct}%">${pool.token1Symbol}</div>
    </div>
    <div class="reserves-row">
      <div class="reserve-item">
        <div class="reserve-label">${pool.token0Symbol}</div>
        <div class="reserve-value">${fmtNum(pool.reserve0Num)}</div>
        <div class="reserve-usd">${fmtUsd(t0val)}</div>
      </div>
      <div class="reserve-item">
        <div class="reserve-label">${pool.token1Symbol}</div>
        <div class="reserve-value">${fmtNum(pool.reserve1Num)}</div>
        <div class="reserve-usd">${fmtUsd(t1val)}</div>
      </div>
    </div>
    <div class="pool-meta">
      <span>LP Supply: ${fmtNum(pool.lpSupplyNum)}</span>
      <span>${pool.priceRatioLabel || ''}</span>
    </div>
  </div>`;
}

// ── Token Card (for overview) ───────────────────────────────────────────────
function renderTokenCard(sym, token) {
  return `
  <div class="card card-clickable token-card" onclick="navigate('#/token/${sym}')">
    <div class="card-header">
      <div>
        <div class="token-name">${token.name}</div>
        <div class="token-symbol">${token.symbol}</div>
      </div>
      <span class="card-badge">${sym}</span>
    </div>
    <div class="token-price">${fmtUsd(token.priceUsd)}</div>
    <div class="token-price-btc">${fmtBtc(token.priceBtc)}</div>
    <div class="mt-8">
      <div class="metric-row"><span class="text-muted text-sm">Market Cap</span><span class="fw-600 text-sm">${fmtUsd(token.marketCapUsd)}</span></div>
      <div class="metric-row"><span class="text-muted text-sm">Circulating</span><span class="fw-600 text-sm">${fmtNum(token.totalSupply)}</span></div>
      <div class="metric-row"><span class="text-muted text-sm">In Protocol</span><span class="fw-600 text-sm text-purple">${fmtPct((token.distribution?.inPoolsPct || 0) + (token.distribution?.inStakingPct || 0))}</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill purple" style="width:${(token.distribution?.inPoolsPct || 0) + (token.distribution?.inStakingPct || 0)}%"></div></div>
  </div>`;
}

// ── Pools List Page ─────────────────────────────────────────────────────────
function renderPoolsList() {
  let html = `
  <div class="detail-header slide-up">
    <div class="detail-title">Liquidity Pools</div>
    <div class="detail-subtitle">All MotoSwap AMM pools on OPNet Regtest</div>
  </div>`;

  // Summary row
  const poolsTvl = DATA.tvl?.pools || {};
  html += `
  <div class="grid-4 section slide-up stagger-1">
    <div class="card">
      <div class="card-title mb-8">Total Pool TVL</div>
      <div class="metric-value text-green">${fmtUsd(poolsTvl.usd)}</div>
      <div class="metric-sub text-yellow">${fmtBtc(poolsTvl.btc)}</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Active Pools</div>
      <div class="metric-value">${DATA.pools?.filter(p => !p.error).length || 0}</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Tokens Paired</div>
      <div class="metric-value">${Object.keys(DATA.tokens || {}).length}</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Pool Share Chart</div>
      <div style="height:80px;"><canvas id="pools-mini-pie"></canvas></div>
    </div>
  </div>`;

  // Pool table
  html += `
  <div class="card section slide-up stagger-2">
    <table class="data-table">
      <thead>
        <tr>
          <th>Pool</th>
          <th class="text-right">TVL (USD)</th>
          <th class="text-right">TVL (BTC)</th>
          <th class="text-right">Reserve 0</th>
          <th class="text-right">Reserve 1</th>
          <th class="text-right">LP Supply</th>
          <th class="text-right">Dominance</th>
        </tr>
      </thead>
      <tbody>`;
  for (const pool of (DATA.pools || [])) {
    if (pool.error) continue;
    html += `
        <tr style="cursor:pointer" onclick="navigate('#/pool/${pool.poolAddress}')">
          <td><strong>${pool.pairLabel}</strong></td>
          <td class="text-right text-green fw-600">${fmtUsd(pool.tvlUsd)}</td>
          <td class="text-right text-yellow">${fmtBtc(pool.tvlBtc)}</td>
          <td class="text-right">${fmtNum(pool.reserve0Num)} <span class="text-muted">${pool.token0Symbol}</span></td>
          <td class="text-right">${fmtNum(pool.reserve1Num)} <span class="text-muted">${pool.token1Symbol}</span></td>
          <td class="text-right">${fmtNum(pool.lpSupplyNum)}</td>

            <div class="dist-legend-color" style="background:${tokenColors[colorIdx % tokenColors.length]}"></div>
            <span class="dist-legend-label">${sym}</span>
            <span class="dist-legend-value">${fmtPct(pct)}</span>
          </div>`;
    colorIdx++;
  }
  html += `</div></div>
    </div>
  </div>`;

  // Reward Tokens
  if (staking.rewardTokens?.length > 0) {
    html += `
    <div class="card section slide-up stagger-3">
      <div class="card-header">
        <span class="card-title">Reward Tokens</span>
        <span class="card-badge">${staking.rewardTokens.length} tokens</span>
      </div>
      <div class="grid-3">`;
    for (const rt of staking.rewardTokens) {
      const tokenData = DATA.tokens?.[rt.symbol] || {};
      html += `
        <div style="cursor:pointer" onclick="navigate('#/token/${rt.symbol}')">
          <div class="metric-label">${rt.symbol}</div>
          <div class="metric-value small">${tokenData.name || rt.symbol}</div>
          <div class="metric-sub mono text-muted">${fmtAddr(rt.address)}</div>
        </div>`;
    }
    html += `</div></div>`;
  }

  return html;
}

// ── Farming Detail Page ─────────────────────────────────────────────────────

  html += `
  <div class="grid-4 section slide-up stagger-1">
    <div class="card">
      <div class="card-title mb-8">Farming TVL</div>
      <div class="metric-value text-orange">${fmtUsd(farmingTvl.usd)}</div>

    <div class="card">
      <div class="card-title mb-8">Active Farms</div>

    </div>
    <div class="card">
      <div class="card-title mb-8">BTC Staked in Farms</div>
      <div class="metric-value text-yellow">${chefs.reduce((sum, c) => sum + c.totalBtcStaked, 0).toFixed(8)}</div>
      <div class="metric-sub">BTC</div>
    </div>
  </div>`;

  // Per-MotoChef breakdown
  for (const chef of chefs) {

    html += `
    <div class="card section slide-up stagger-2">
      <div class="card-header">
        <span class="card-title">${chef.rewardToken} Farm</span>
        <span class="card-badge">${bonusActive ? chef.bonusMultiplier + 'x Bonus Active' : 'Normal Emissions'}</span>
      </div>
      <div class="detail-address mb-8">${chef.address}</div>

      <div class="grid-4 mb-16">
        <div>
          <div class="metric-label">Farm TVL</div>
          <div class="metric-value small text-orange">${fmtUsd(chef.tvlUsd)}</div>
        </div>
        <div>
          <div class="metric-label">${chef.rewardToken}/Block</div>
          <div class="metric-value small">${fmtNum(chef.motoPerBlock)}</div>
          <div class="metric-sub text-green">${fmtUsd(emissionUsd)}/block</div>
        </div>
        <div>
          <div class="metric-label">Total Alloc Points</div>
          <div class="metric-value small">${fmtNum(chef.totalAllocPoint, 0)}</div>
        </div>
        <div>
          <div class="metric-label">Bonus End Block</div>
          <div class="metric-value small">#${fmtNum(chef.bonusEndBlock, 0)}</div>
          <div class="metric-sub">${bonusActive ? 'In ' + fmtNum(chef.bonusEndBlock - currentBlock, 0) + ' blocks' : 'Ended'}</div>
        </div>
      </div>`;

    // BTC staking in this farm
    if (chef.totalBtcStaked > 0) {
      html += `
      <div class="card mb-16" style="background:rgba(234,179,8,0.06);border-color:rgba(234,179,8,0.2)">
        <div class="grid-3">
          <div>
            <div class="metric-label">BTC Staked</div>
            <div class="metric-value small text-yellow">${chef.totalBtcStaked.toFixed(8)} BTC</div>
          </div>
          <div>
            <div class="metric-label">Value (USD)</div>
            <div class="metric-value small text-green">${fmtUsd(chef.totalBtcStakedUsd)}</div>
          </div>
          <div>
            <div class="metric-label">BTC Pool Weight</div>
            <div class="metric-value small">${chef.pools.find(p => p.poolType === 'btc') ? fmtPct(chef.pools.find(p => p.poolType === 'btc').allocPct) : 'N/A'}</div>
          </div>
        </div>
      </div>`;

    // Farm pools table
    if (chef.pools.length > 0) {
      html += `
      <table class="data-table">
        <thead>
          <tr>
            <th>Pool ID</th>
            <th>LP / Token</th>
            <th>Type</th>
            <th class="text-right">LP Staked</th>
            <th class="text-right">TVL (USD)</th>
            <th class="text-right">TVL (BTC)</th>
            <th class="text-right">Alloc Points</th>
            <th class="text-right">Weight</th>
          </tr>
        </thead>
        <tbody>`;

      for (const fp of chef.pools) {
        const isLP = fp.poolType === 'lp';
        html += `
          <tr${isLP ? ' style="cursor:pointer" onclick="navigate(\'#/pool/' + fp.lpTokenAddress + '\')"' : ''}>
            <td><strong>#${fp.poolId}</strong></td>
            <td>${fp.pairLabel}${fp.poolType === 'single' ? ' (single)' : fp.poolType === 'lp' ? ' LP' : ''}</td>
            <td><span class="card-badge">${fp.poolType}</span></td>
            <td class="text-right">${fmtNum(fp.lpStaked)}</td>

      html += `<div class="mt-8 text-sm text-muted">Errors: ${chef.errors.join('; ')}</div>`;
    }

    html += `</div>`;

  // No farms found
  if (chefs.length === 0) {
    html += `
    <div class="card section slide-up stagger-2">
      <div style="text-align:center;padding:40px 0">
        <div class="text-muted" style="font-size:1.1rem">No active MotoChef farms found</div>
        <div class="text-muted text-sm mt-8">Farms will appear here when MotoChef contracts are deployed via the MotoChef Factory</div>
      </div>
    </div>`;
  }

  if (farming.errors?.length > 0) {
    html += `<div class="card section text-sm text-muted">Farming errors: ${farming.errors.join('; ')}</div>`;
  }

  return html;
}

// ── Arbitrage Page ──────────────────────────────────────────────────────────
function impactClass(pct) {
  if (pct < 1) return 'impact-low';
  if (pct < 5) return 'impact-med';
  if (pct < 10) return 'impact-high';
  return 'impact-extreme';
}

function deviationClass(pct) {
  if (pct < 1) return 'low';
  if (pct < 5) return 'med';
  if (pct < 10) return 'high';
  return 'extreme';
}

function renderArbitrage() {
  const arb = DATA.arbitrage || {};
  const summary = arb.summary || {};
  const directArb = arb.directArb || [];
  const triangularArb = arb.triangularArb || [];
  const priceImpact = arb.priceImpact || [];
  const liquidityDepth = arb.liquidityDepth || [];

  let html = `
  <div class="detail-header slide-up">
    <div class="detail-title">Arbitrage Analysis</div>
    <div class="detail-subtitle">MotoSwap pool prices vs NativeSwap oracle prices &middot; Mispricings and opportunities</div>
  </div>`;

  // 1. Hero metrics
  const bestTri = summary.bestTriArb;
  html += `
  <div class="grid-4 section slide-up stagger-1">
    <div class="card">
      <div class="card-title mb-8">Total Arb Profit Available</div>
      <div class="metric-value text-green">${fmtUsd(summary.totalProfitAvailable)}</div>
      <div class="metric-sub">${summary.viableCount || 0} viable opportunities</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Max Pool Deviation</div>
      <div class="metric-value ${summary.maxDeviation > 5 ? 'text-orange' : 'text-yellow'}">${fmtPct(summary.maxDeviation)}</div>
      <div class="metric-sub">from oracle price</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Best Tri-Arb</div>
      <div class="metric-value small ${bestTri && bestTri.profitUsd > 0 ? 'text-green' : 'text-muted'}">${bestTri ? fmtUsd(bestTri.profitUsd) : 'None'}</div>
      <div class="metric-sub">${bestTri ? bestTri.label : 'No profitable cycles'}</div>
    </div>
    <div class="card">
      <div class="card-title mb-8">Avg Imbalance</div>
      <div class="metric-value text-purple">${fmtPct(summary.avgDeviation)}</div>
      <div class="metric-sub">across ${summary.totalPools || 0} pools</div>
    </div>
  </div>`;

  // 2. Direct Arb table
  html += `
  <div class="section-title slide-up stagger-2">Direct Arbitrage Opportunities</div>
  <div class="card section slide-up stagger-2">
    <table class="data-table">
      <thead>
        <tr>
          <th>Pool</th>
          <th class="text-right">Pool Price</th>
          <th class="text-right">Oracle Price</th>
          <th class="text-right">Deviation</th>
          <th>Action</th>
          <th class="text-right">Optimal Size</th>
          <th class="text-right">Profit</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>`;
  const sortedArb = [...directArb].sort((a, b) => b.deviationPct - a.deviationPct);
  for (const a of sortedArb) {
    const devClass = deviationClass(a.deviationPct);
    html += `
        <tr style="cursor:pointer" onclick="navigate('#/pool/${a.poolAddress}')">
          <td><strong>${a.pool}</strong></td>
          <td class="text-right mono text-sm">${a.poolPrice > 0 ? a.poolPrice.toFixed(6) : '-'}</td>
          <td class="text-right mono text-sm">${a.oraclePrice > 0 ? a.oraclePrice.toFixed(6) : '-'}</td>
          <td class="text-right fw-600 ${impactClass(a.deviationPct)}">${fmtPct(a.deviationPct)}</td>
          <td>${a.action ? `<span class="arb-direction-badge sell">${a.action}</span>` : '<span class="arb-direction-badge neutral">Balanced</span>'}</td>
          <td class="text-right">${a.optimalInput > 0 ? fmtNum(a.optimalInput) + ' ' + a.sellToken : '-'}<br><span class="text-muted text-sm">${a.optimalInputUsd > 0 ? fmtUsd(a.optimalInputUsd) : ''}</span></td>
          <td class="text-right fw-600 ${a.profitUsd > 0 ? 'text-green' : 'text-muted'}">${a.profitUsd > 0 ? fmtUsd(a.profitUsd) : '-'}<br><span class="text-muted text-sm">${a.profitPct > 0 ? fmtPct(a.profitPct) + ' ROI' : ''}</span></td>
          <td>${a.isViable ? '<span class="arb-direction-badge buy">Viable</span>' : '<span class="arb-direction-badge neutral">Low</span>'}</td>
        </tr>`;
  }
  html += `</tbody></table></div>`;

  // 3. Direct Arb detail cards
  html += `<div class="grid-3 section slide-up stagger-3">`;
  for (const a of sortedArb) {
    const devClass = deviationClass(a.deviationPct);
    html += `
    <div class="card ${a.isViable ? 'arb-viable' : 'arb-not-viable'}">
      <div class="card-header">
        <span class="card-title">${a.pool}</span>
        <span class="card-badge">${fmtPct(a.deviationPct)} off</span>
      </div>
      ${a.action ? `
      <div style="margin-bottom:12px">
        <span class="arb-direction-badge sell">Sell ${a.sellToken}</span>
        <span class="arb-arrow">&#8594;</span>
        <span class="arb-direction-badge buy">Buy ${a.buyToken}</span>
      </div>
      <div class="metric-row"><span class="text-muted text-sm">Optimal Input</span><span class="fw-600 text-sm">${fmtNum(a.optimalInput)} ${a.sellToken} (${fmtUsd(a.optimalInputUsd)})</span></div>
      <div class="metric-row"><span class="text-muted text-sm">Expected Output</span><span class="fw-600 text-sm">${fmtNum(a.expectedOutput)} ${a.buyToken} (${fmtUsd(a.expectedOutputUsd)})</span></div>
      <div class="metric-row"><span class="text-muted text-sm">Net Profit</span><span class="fw-700 text-sm text-green">${fmtUsd(a.profitUsd)} (${fmtPct(a.profitPct)})</span></div>
      ` : '<div class="text-muted text-sm" style="padding:12px 0">Pool is near equilibrium</div>'}
      <div class="deviation-bar"><div class="deviation-fill ${devClass}" style="width:${Math.min(a.deviationPct * 2, 100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span class="text-muted" style="font-size:0.68rem">0%</span>
        <span class="text-muted" style="font-size:0.68rem">50%</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  // 4. Triangular Arb section
  if (triangularArb.length > 0) {
    html += `<div class="section-title slide-up stagger-4">Triangular Arbitrage</div>`;
    // Sort by profit, show best first
    const sortedTri = [...triangularArb].sort((a, b) => b.profitUsd - a.profitUsd);
    html += `<div class="grid-2 section slide-up stagger-4">`;
    for (const tri of sortedTri) {
      const steps = tri.steps || [];
      html += `
      <div class="card ${tri.isViable ? 'arb-viable' : 'arb-not-viable'}">
        <div class="card-header">
          <span class="card-title">${tri.direction === 'clockwise' ? 'Clockwise' : 'Counter-CW'}</span>
          <span class="card-badge ${tri.profitUsd > 0 ? '' : ''}">${tri.profitUsd > 0 ? '+' : ''}${fmtUsd(tri.profitUsd)}</span>
        </div>
        <div class="tri-arb-cycle">`;
      const toks = tri.tokens || [];
      for (let t = 0; t < toks.length; t++) {
        html += `<span class="cycle-token">${toks[t]}</span>`;
        html += `<span class="cycle-arrow">&#8594;</span>`;
      }
      html += `<span class="cycle-token">${toks[0] || ''}</span>`;
      html += `</div>`;

      // Step-by-step breakdown
      for (let s = 0; s < steps.length; s++) {
        const step = steps[s];
        if (s === 0) {
          html += `<div class="tri-arb-step"><span class="step-num">IN</span><span class="fw-600">${fmtNum(step.amount)} ${step.token}</span><span class="text-muted text-sm">(${fmtUsd(step.amount * (DATA.prices?.[step.token]?.usd || 0))})</span></div>`;
        } else {
          html += `<div class="tri-arb-step"><span class="step-num">${s}</span><span class="text-muted text-sm">via ${step.pool}</span><span class="arb-arrow">&#8594;</span><span class="fw-600">${fmtNum(step.amount)} ${step.token}</span></div>`;
        }
      }

      html += `
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-color)">
          <div class="metric-row"><span class="text-muted text-sm">Optimal Input</span><span class="fw-600 text-sm">${fmtNum(tri.optimalInput)} ${toks[0]} (${fmtUsd(tri.optimalInputUsd)})</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Final Output</span><span class="fw-600 text-sm">${fmtNum(tri.finalOutput)} ${toks[0]}</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Net P/L</span><span class="fw-700 text-sm ${tri.profitUsd > 0 ? 'text-green' : 'text-red'}">${tri.profitUsd > 0 ? '+' : ''}${fmtUsd(tri.profitUsd)} (${tri.profitPct > 0 ? '+' : ''}${fmtPct(tri.profitPct)})</span></div>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // 5. Price Impact section
  if (priceImpact.length > 0) {
    html += `<div class="section-title slide-up stagger-5">Price Impact Analysis</div>`;
    for (const pool of priceImpact) {
      // Group sells by direction
      const directions = {};
      for (const s of pool.sells) {
        if (!directions[s.direction]) directions[s.direction] = [];
        directions[s.direction].push(s);
      }
      html += `
      <div class="card section slide-up stagger-5">
        <div class="card-header">
          <span class="card-title">${pool.pool} - Price Impact</span>
        </div>
        <table class="data-table">
          <thead>
            <tr><th>Direction</th><th class="text-right">Trade Size</th><th class="text-right">Output</th><th class="text-right">Impact</th><th class="text-right">Slippage Cost</th></tr>
          </thead>
          <tbody>`;
      for (const [dir, sells] of Object.entries(directions)) {
        for (const s of sells) {
          const ic = impactClass(s.impactPct);
          html += `
            <tr>
              <td>${dir}</td>
              <td class="text-right">${fmtUsd(s.sizeUsd)}</td>
              <td class="text-right">${fmtUsd(s.outputUsd)}</td>
              <td class="text-right fw-600 ${ic}">${fmtPct(s.impactPct)}</td>
              <td class="text-right ${s.slippageUsd > 0 ? 'text-red' : 'text-green'}">${fmtUsd(Math.abs(s.slippageUsd))}</td>
            </tr>`;
        }
      }
      html += `</tbody></table></div>`;
    }

    // Price Impact chart
    html += `
    <div class="card section slide-up stagger-5">
      <div class="card-header">
        <span class="card-title">Slippage Curves</span>
        <span class="card-badge">All Pools</span>
      </div>
      <div class="chart-container"><canvas id="impact-chart"></canvas></div>
    </div>`;
  }

  // 6. Liquidity Depth cards
  if (liquidityDepth.length > 0) {
    html += `<div class="section-title slide-up stagger-6">Liquidity Depth</div>`;
    html += `<div class="grid-3 section slide-up stagger-6">`;
    for (const pool of liquidityDepth) {
      html += `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${pool.pool}</span>
        </div>`;
      for (const d of pool.depths) {
        html += `
        <div style="margin-bottom:12px">
          <div class="metric-label">Max trade at ${d.impactPct}% impact</div>
          <div class="metric-row"><span class="text-muted text-sm">Sell ${pool.token0}</span><span class="fw-600 text-sm">${fmtNum(d.maxToken0)} (${fmtUsd(d.maxToken0Usd)})</span></div>
          <div class="metric-row"><span class="text-muted text-sm">Sell ${pool.token1}</span><span class="fw-600 text-sm">${fmtNum(d.maxToken1)} (${fmtUsd(d.maxToken1Usd)})</span></div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  return html;
}

// ── Chart Initialization ────────────────────────────────────────────────────
function initCharts(route) {
  if (route === '#/' || route === '' || route === '#') {
    initTvlChart();
    initTvlPie();
  } else if (route === '#/pools') {
    initPoolsMiniPie();
  } else if (route.startsWith('#/token/')) {
    const sym = route.replace('#/token/', '');
    initTokenDistPie(sym);
  } else if (route === '#/staking') {
    initStakingPie();
  } else if (route === '#/arbitrage') {
    initImpactChart();
  }
}

function chartColors() {
  return {
    purple: '#A855F7',
    purpleFade: 'rgba(168, 85, 247, 0.1)',
    green: '#22C55E',
    greenFade: 'rgba(34, 197, 94, 0.1)',
    cyan: '#06B6D4',
    cyanFade: 'rgba(6, 182, 212, 0.1)',
    yellow: '#EAB308',
    blue: '#3B82F6',
    orange: '#F97316',
    pink: '#EC4899',
    muted: '#6B6B80',
    border: 'rgba(123, 47, 190, 0.2)',
    grid: 'rgba(123, 47, 190, 0.08)',
    text: '#A0A0B8',
  };
}

function initTvlChart() {
  const canvas = document.getElementById('tvl-chart');
  if (!canvas) return;
  const c = chartColors();

  const labels = HISTORY.map(h => fmtDate(h.t));
  const tvlData = HISTORY.map(h => h.totalTvlUsd);
  const poolsData = HISTORY.map(h => h.poolsTvlUsd);
  const stakingData = HISTORY.map(h => h.stakingTvlUsd);
  const farmingData = HISTORY.map(h => h.farmingTvlUsd || 0);

  chartInstances['tvl-chart'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Total TVL',
          data: tvlData,
          borderColor: c.purple,
          backgroundColor: c.purpleFade,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 2,
        },
        {
          label: 'Pools TVL',
          data: poolsData,
          borderColor: c.green,
          backgroundColor: c.greenFade,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 1.5,
        },
        {
          label: 'Staking TVL',
          data: stakingData,
          borderColor: c.cyan,
          backgroundColor: c.cyanFade,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 1.5,
        },
        {
          label: 'Farming TVL',
          data: farmingData,
          borderColor: c.orange,
          backgroundColor: 'rgba(249, 115, 22, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 1.5,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: c.text, font: { family: "'Poppins', sans-serif", size: 11 }, boxWidth: 12, padding: 16 },
        },
        tooltip: {
          backgroundColor: 'rgba(18,18,28,0.95)',
          borderColor: c.border,
          borderWidth: 1,
          titleColor: '#F0F0F5',
          bodyColor: '#A0A0B8',
          titleFont: { family: "'Poppins', sans-serif", weight: '600' },
          bodyFont: { family: "'Poppins', sans-serif" },
          callbacks: {

function initTvlPie() {
  const canvas = document.getElementById('tvl-pie');

  const pools = DATA.pools?.filter(p => !p.error) || [];

  const farmingVal = DATA.tvl?.farming?.usd || 0;

  const labels = [...pools.map(p => p.pairLabel), 'Staking'];
  const values = [...pools.map(p => p.tvlUsd || 0), stakingVal];
  if (farmingVal > 0) { labels.push('Farming'); values.push(farmingVal); }
  const colors = [c.purple, c.green, c.cyan, c.yellow, c.orange, c.pink, c.blue];

  chartInstances['tvl-pie'] = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors.slice(0, labels.length),
        borderColor: 'rgba(10,10,15,0.8)',
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(18,18,28,0.95)',
          borderColor: c.border,
          borderWidth: 1,
          titleColor: '#F0F0F5',
          bodyColor: '#A0A0B8',
          callbacks: { label: ctx => ctx.label + ': ' + fmtUsd(ctx.raw) },

function initImpactChart() {
  const canvas = document.getElementById('impact-chart');
  if (!canvas) return;
  const c = chartColors();
  const priceImpact = DATA.arbitrage?.priceImpact || [];
  if (priceImpact.length === 0) return;

  const tradeSizes = [100, 1000, 10000, 100000];
  const labels = tradeSizes.map(s => fmtUsd(s));
  const poolColors = [c.purple, c.green, c.cyan, c.yellow, c.orange, c.pink];
  const datasets = [];
  let colorIdx = 0;

  for (const pool of priceImpact) {
    // Group by direction, just take first direction for each pool for the chart
    const directions = {};
    for (const s of pool.sells) {
      if (!directions[s.direction]) directions[s.direction] = [];
      directions[s.direction].push(s);
    }
    for (const [dir, sells] of Object.entries(directions)) {
      const color = poolColors[colorIdx % poolColors.length];
      datasets.push({
        label: `${pool.pool} (${dir})`,
        data: sells.map(s => s.impactPct),
        borderColor: color,
        backgroundColor: 'transparent',
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 5,
        borderWidth: 2,
      });
      colorIdx++;
    }
  }

  chartInstances['impact-chart'] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: c.text, font: { family: "'Poppins', sans-serif", size: 10 }, boxWidth: 10, padding: 10 },
        },
        tooltip: {
          backgroundColor: 'rgba(18,18,28,0.95)',
          borderColor: c.border,
          borderWidth: 1,
          titleColor: '#F0F0F5',
          bodyColor: '#A0A0B8',
          callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtPct(ctx.raw) },
        },
      },
      scales: {
        x: {
          title: { display: true, text: 'Trade Size (USD)', color: c.muted, font: { family: "'Poppins', sans-serif", size: 11 } },
          grid: { color: c.grid },
          ticks: { color: c.muted, font: { family: "'Poppins', sans-serif", size: 10 } },
        },
        y: {
          title: { display: true, text: 'Price Impact %', color: c.muted, font: { family: "'Poppins', sans-serif", size: 11 } },
          grid: { color: c.grid },
          ticks: { color: c.muted, font: { family: "'Poppins', sans-serif", size: 10 }, callback: v => fmtPct(v) },
        },
      },
    },
  });
}

// ── Ticker ──────────────────────────────────────────────────────────────────
function updateTicker() {
  if (!DATA) return;
  const track = document.getElementById('ticker-track');
  if (!track) return;

  let items = [];

  // BTC Price
  items.push(`<span class="ticker-item"><span class="symbol">BTC</span><span class="price">${fmtUsd(DATA.btcPrice?.usd)}</span></span>`);
  items.push(`<span class="ticker-sep">&middot;</span>`);

  // Token prices
  for (const [sym, token] of Object.entries(DATA.tokens || {})) {
    if (token.error) continue;
    items.push(`<span class="ticker-item"><span class="symbol">${sym}</span><span class="price">${fmtUsd(token.priceUsd)}</span><span class="btc-price">(${fmtBtc(token.priceBtc)})</span></span>`);
    items.push(`<span class="ticker-sep">&middot;</span>`);
  }

  // TVL
  items.push(`<span class="ticker-item"><span class="symbol">TVL</span><span class="price">${fmtUsd(DATA.tvl?.total?.usd)}</span></span>`);
  items.push(`<span class="ticker-sep">&middot;</span>`);

  // Pool TVLs
  for (const pool of (DATA.pools || [])) {
    if (pool.error) continue;
    items.push(`<span class="ticker-item"><span class="symbol">${pool.pairLabel}</span><span class="price">${fmtUsd(pool.tvlUsd)}</span></span>`);
    items.push(`<span class="ticker-sep">&middot;</span>`);
  }

  // Duplicate for seamless scroll
  const content = items.join('');
  track.innerHTML = content + content;
}

// ── Status Banner ───────────────────────────────────────────────────────────
function updateStatus(isLive) {
  const banner = document.getElementById('status-banner');
  if (!banner) return;
  if (isLive && DATA) {
    banner.className = 'status-banner status-banner--live';
    banner.innerHTML = `<span class="pulse-dot"></span> Live &middot; Block #${fmtFull(DATA.chain?.blockNumber)} &middot; Updated ${fmtTime(DATA.lastUpdated)}`;
  } else {
    banner.className = 'status-banner status-banner--loading';
    banner.innerHTML = `<span class="pulse-dot"></span> Loading data...`;
  }
}

// ── Loading Progress ─────────────────────────────────────────────────────────
let loadingProgress = 0;
let loadingInterval = null;
let isFirstLoad = true;

function startLoadingProgress() {
  const overlay = document.getElementById('loading-overlay');
  const fill = document.getElementById('loading-fill');
  const status = document.getElementById('loading-status');
  if (!overlay || !fill) return;

  if (!isFirstLoad) return; // Only show overlay on first load

  loadingProgress = 0;
  overlay.classList.remove('hidden');

  const stages = [
    { pct: 10, text: 'Connecting to OPNet RPC...' },
    { pct: 25, text: 'Discovering tokens and pools...' },
    { pct: 40, text: 'Fetching NativeSwap oracle prices...' },
    { pct: 55, text: 'Computing pool reserves and TVL...' },
    { pct: 70, text: 'Analyzing staking and farming...' },
    { pct: 82, text: 'Running arbitrage analysis...' },
    { pct: 90, text: 'Computing price impact curves...' },
    { pct: 95, text: 'Finalizing data...' },
  ];
  let stageIdx = 0;

  loadingInterval = setInterval(() => {
    if (stageIdx < stages.length) {
      loadingProgress = stages[stageIdx].pct;
      fill.style.width = loadingProgress + '%';
      if (status) status.textContent = stages[stageIdx].text;
      stageIdx++;
    }
  }, 2500);
}

function stopLoadingProgress() {
  const overlay = document.getElementById('loading-overlay');
  const fill = document.getElementById('loading-fill');
  const status = document.getElementById('loading-status');
  if (loadingInterval) { clearInterval(loadingInterval); loadingInterval = null; }
  if (fill) fill.style.width = '100%';
  if (status) status.textContent = 'Data loaded!';
  setTimeout(() => {
    if (overlay) overlay.classList.add('hidden');
    isFirstLoad = false;
  }, 400);
}

// ── Data Fetching ───────────────────────────────────────────────────────────
async function fetchData() {
  if (isFirstLoad) startLoadingProgress();
  try {
    const [dataRes, historyRes] = await Promise.all([
      fetch('/api/data'),
      fetch('/api/history?limit=200'),
    ]);
    DATA = await dataRes.json();
    HISTORY = await historyRes.json();

    stopLoadingProgress();
    updateStatus(true);
    updateTicker();
    render();

    const footerEl = document.getElementById('footer-update');
    if (footerEl) footerEl.textContent = 'Last updated: ' + fmtTime(DATA.lastUpdated);
  } catch (e) {
    console.error('Fetch error:', e);
    // If no data yet, load demo data for static deployments (Vercel)
    if (!DATA) {
      DATA = getMotoScopeDemoData();
      HISTORY = [];
      stopLoadingProgress();
      render();
      const banner = document.getElementById('status-banner');
      if (banner) {
        banner.className = 'status-banner status-banner--loading';
        banner.innerHTML = '<span class="pulse-dot"></span> DEMO MODE - Showing sample data. Run server.mjs locally for live analytics.';
      }
    } else {
      updateStatus(false);
    }
    if (isFirstLoad) {
      setTimeout(fetchData, 5000);
    }
  }
}
